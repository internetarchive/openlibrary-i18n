name: Test OL_BOT_PAT

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Verify openlibrary-bot identity
        env:
          GH_TOKEN: ${{ secrets.OL_BOT_PAT }}
        run: |
          ACTOR=$(gh api user --jq '.login')
          echo "Authenticated as: $ACTOR"
          if [ "$ACTOR" != "openlibrary-bot" ]; then
            echo "ERROR: expected openlibrary-bot, got $ACTOR"
            exit 1
          fi

      - name: Create and close test issue
        env:
          GH_TOKEN: ${{ secrets.OL_BOT_PAT }}
        run: |
          NUM=$(gh api --method POST repos/internetarchive/openlibrary-i18n/issues \
            -f title="[test] OL_BOT_PAT permission check" \
            -f body="Automated secret verification — closing immediately." \
            --jq '.number')
          echo "Created issue #$NUM as $(gh api user --jq '.login')"
          gh api --method PATCH repos/internetarchive/openlibrary-i18n/issues/$NUM \
            -f state=closed
          echo "Issue #$NUM closed — OL_BOT_PAT verified OK"
