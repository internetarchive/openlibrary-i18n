name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude"
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install babel pytest anthropic

      - uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.OL_CLAUDE_CODE_TOKEN }}
        with:
          prompt: ${{ github.event.inputs.prompt || '' }}
          claude_args: "--max-turns 10"
