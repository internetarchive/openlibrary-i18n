name: Translate

on:
  repository_dispatch:
    types: [openlibrary-pot-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install babel anthropic pytest

      - uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.OL_CLAUDE_CODE_TOKEN }}
        with:
          prompt: "@i18n-translation-instructions.md"
          claude_args: "--max-turns 50"

      - name: Auto-merge completed translation PRs
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find open PRs on i18n/ai-* branches created by this run's agent.
          # Try --auto first (merges when required checks pass); fall back to
          # immediate merge if branch protection / auto-merge is not configured.
          gh pr list \
            --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("i18n/ai-")) | .number' \
          | while IFS= read -r pr; do
              echo "Merging PR #$pr"
              gh pr merge "$pr" --auto --squash --delete-branch \
              || gh pr merge "$pr" --squash --delete-branch \
              || echo "WARNING: could not merge PR #$pr — check branch protection settings"
            done
